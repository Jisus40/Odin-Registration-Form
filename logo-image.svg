<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200" width="200" height="200">
  <!-- Fondo transparente -->
  
  <!-- Marco superior (grueso y redondeado) -->
  <rect x="40" y="15" width="120" height="25" rx="8" fill="#4a4a4a"/>
  <rect x="45" y="20" width="110" height="15" rx="5" fill="#6b6b6b"/>
  
  <!-- Marco inferior (grueso y redondeado) -->
  <rect x="40" y="160" width="120" height="25" rx="8" fill="#4a4a4a"/>
  <rect x="45" y="165" width="110" height="15" rx="5" fill="#6b6b6b"/>
  
  <!-- Cuerpo del reloj - forma de reloj de arena gruesa -->
  <path d="M55 40 
           L145 40 
           L120 100 
           L145 160 
           L55 160 
           L80 100 
           Z" 
        fill="#e8e8e8" 
        stroke="#4a4a4a" 
        stroke-width="4"/>
  
  <!-- Vidrio interior -->
  <path d="M65 45 
           L135 45 
           L115 100 
           L135 155 
           L65 155 
           L85 100 
           Z" 
        fill="#f5f5f5"/>
  
  <!-- Arena superior (montoncito grueso) -->
  <path d="M68 48 
           L132 48 
           L115 75 
           L85 75 
           Z" 
        fill="#ff9500"/>
  
  <!-- Arena cayendo (línea gruesa) -->
  <rect x="97" y="75" width="6" height="50" rx="3" fill="#ff9500"/>
  
  <!-- Arena inferior (montón grande) -->
  <path d="M85 125 
           L115 125 
           L132 152 
           L68 152 
           Z" 
        fill="#ff9500"/>
  
  <!-- Partículas cayendo (efecto) -->
  <circle cx="100" cy="85" r="2" fill="#ff9500"/>
  <circle cx="100" cy="95" r="2" fill="#ff9500"/>
  <circle cx="100" cy="105" r="2" fill="#ff9500"/>
  
  <!-- Brillo/vidrio -->
  <path d="M70 48 L90 48 L85 100 L75 152 L68 152 L75 100 Z" fill="white" opacity="0.3"/>
  
  <!-- Sombra suave -->
  <ellipse cx="100" cy="185" rx="50" ry="8" fill="#000" opacity="0.1"/>
</svg>